# ============================================================
# TTS Generator Configuration
# ------------------------------------------------------------
# Lines starting with '#' or '!' are comments.
# Format: KEY=VALUE   (':' also works as a separator)
# Leave a value blank to use its default / skip it.
# ============================================================

# Path to the input Excel file. REQUIRED.
# The file must contain a column named 'Utterance'.
EXCEL_PATH=input/utterances.xlsx

# Directory where generated audio will be written.
# Subfolders 'original/' and 'dialogflow-ready/' are created here.
OUTPUT_DIR=tts-output

# Max number of utterances to process. Leave blank (or 0) for ALL.
LIMIT=

# Which TTS engine to use: google | azure | edge
TTS_SERVICE=google

# --- Google TTS (used only when TTS_SERVICE=google) ---
# Path to the service-account JSON key file.
# Leave blank to fall back to the GOOGLE_APPLICATION_CREDENTIALS env var.
GOOGLE_CREDS_PATH=credentials/service-account.json

# --- Azure TTS (used only when TTS_SERVICE=azure) ---
AZURE_SPEECH_KEY=
AZURE_SPEECH_REGION=
